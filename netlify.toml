[dev]
  framework = "astro"
  command = "astro dev"
  targetPort = 4321
  autoLaunch = false

# Draft preview: push to the `preview` branch to get a Netlify deploy that
# includes draft posts. Share the resulting URL (e.g. preview--sourcier.netlify.app)
# before a post goes live. Never merged into main.
[context."branch-deploy"]
  [context."branch-deploy".environment]
    SHOW_DRAFTS = "true"

[build]
  command = "astro build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Rebuild the site daily at 07:00 UTC so future-dated posts go live automatically.
# Requires BUILD_HOOK_ID environment variable — see netlify/functions/scheduled-build.mjs.
[functions."scheduled-build"]
  schedule = "45 7 * * *" # always before 09:00 UK time: 07:45 GMT in winter, 08:45 BST in summer

# ── Comment approval system ────────────────────────────────────────────────────
#
# Required environment variables (Netlify → Site configuration → Environment variables):
#
#   BUILD_HOOK_ID             Build hook ID for scheduled deploys.
#                             Netlify → Site configuration → Build & deploy → Build hooks
#                             Create a hook named "Scheduled publish", copy the ID from the URL.
#
#   NETLIFY_ACCESS_TOKEN      Personal access token
#                             https://app.netlify.com/user/applications
#
#   APPROVED_COMMENTS_FORM_ID Form ID for the "approved-comments" form.
#                             Visible in the Netlify Forms dashboard URL after
#                             the first comment is approved.
#
#   APPROVAL_SECRET           Random secret for HMAC-signing approve/delete links.
#                             Generate with: openssl rand -hex 32
#
#   SITE_URL                  Public URL of the site, e.g. https://sourcier.uk
#
#   RESEND_API_KEY            API key from https://resend.com
#                             (free tier: 3 000 emails/month)
#
#   NOTIFY_FROM_EMAIL         Verified Resend sender address, e.g. comments@sourcier.uk
#
#   NOTIFY_EMAIL              Address to receive comment notifications
#
# One-time Netlify dashboard setup:
#   Forms → blog-comments → Form notifications → Add notification
#   → Outgoing webhook → URL: https://{your-site}/.netlify/functions/comment-handler
# ──────────────────────────────────────────────────────────────────────────────
